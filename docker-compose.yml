version: "3.9"

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  chatconnect:
    driver: bridge

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── Node.js Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatconnect-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      # ─ All secrets come from .env file (never hard-code here) ─
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:5000}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      AI_SERVICE_URL: http://ai-service:8000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      ai-service:
        condition: service_healthy
    networks:
      - chatconnect
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── FastAPI AI Microservice ──────────────────────────────────────────────────
  ai-service:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chatconnect-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      ALLOWED_ORIGINS: ${CLIENT_URL:-http://localhost:5173},http://backend:5000,http://localhost:5000
    networks:
      - chatconnect
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ai/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
